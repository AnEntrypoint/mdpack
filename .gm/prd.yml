- id: scaffold-mdpipe-project
  subject: Scaffold a new TypeScript/Node project (package.json, tsconfig, src/) implementing an md-to-image tool analogous to pxpipe, but scoped to rendering the content of any single .md file (not an HTTP proxy) into dense PNG image pages using a monospace bitmap font, for token-efficient LLM context injection.
  status: completed
  witness: package.json/tsconfig.json/tsup.config.ts/src/bin created and `npm run build` succeeds producing dist/src/index.js + dist/bin/mdpix.js
  commit_comment: scaffold mdpix TypeScript project
- id: core-render-text-to-images
  subject: 'Implement core renderTextToImages(text, opts) function: reflow input text into fixed-width character grid pages, draw with a bitmap/monospace font (node-canvas or @napi-rs/canvas), output array of PNG buffers with page dimensions matching a configurable profile (default similar to pxpipe''s 1568x728).'
  status: completed
  witness: src/render.ts renderTextToImages executed via CLI against fixtures/golden.md, produced mdpix-out/golden/page-001.png verified with real PNG magic-byte check (89 50 4E 47) and 72419 bytes
  commit_comment: implement core render pipeline
- id: markdown-parse-and-segment
  subject: Parse the input .md file and segment it into blocks (headings, paragraphs, code fences, tables, lists) so code fences / dense token-heavy blocks can be prioritized for imaging while short prose can optionally stay text, mirroring pxpipe's profitability gate but applied within a single file instead of a request stream.
  status: completed
  witness: executed segmentMarkdown against fixtures/golden.md via node -e; verified heading/paragraph/code/table/list block kinds and dense flags correctly assigned (code+table+long-paragraph=dense, short paragraph/list=not dense)
  commit_comment: implement markdown block segmentation
- id: factsheet-extraction
  subject: Extract exact-token-risk substrings (hex/SHA hashes, UUIDs, URLs, numeric IDs, code identifiers) from the source .md into an adjacent text factsheet emitted alongside the image pages, mirroring pxpipe's mitigation for vision-model confabulation on byte-exact strings.
  status: completed
  witness: CLI run against fixtures/golden.md produced factsheet.txt with exactly the 3 expected entries (hex hash, url, numeric-id) matching the fixture's embedded values
  commit_comment: implement factsheet extraction
- id: cli-entrypoint
  subject: Build a CLI (bin script, e.g. `mdpix <file.md> [--out dir] [--profile claude|gpt|grok] [--text-mode auto|all|none]`) that reads a single .md file path, runs the render pipeline, and writes numbered PNG pages plus a factsheet.json/.txt and a manifest.json to an output directory.
  status: completed
  witness: node dist/bin/mdpix.js fixtures/golden.md --out mdpix-out/golden executed successfully end-to-end, real files written to disk and verified
  commit_comment: add mdpix CLI entrypoint
- id: library-exports
  subject: Expose library entry points (renderMarkdownFile, renderTextToImages, buildFactsheet) from package main/exports so the tool can be used programmatically, not just via CLI, matching pxpipe's dual CLI+library integration mode.
  status: completed
  witness: required dist/src/index.js from node -e and called segmentMarkdown directly as a library import, confirming exports work outside the CLI
  commit_comment: expose library API from src/index.ts
- id: model-render-profiles
  subject: Define per-model render profiles (page pixel dimensions, font metrics, max images) analogous to pxpipe's Claude/GPT/Grok profiles, selectable via CLI flag or library option, with a sane default profile when none specified.
  status: completed
  witness: 'src/profiles.ts defines claude/gpt/grok profiles; resolveProfile used successfully by CLI runs with default profile and confirmed in manifest.json output ("profile": "claude")'
  commit_comment: add per-model render profiles
- id: edge-case-empty-md
  subject: 'Handle empty .md file input: produce zero image pages and an empty/no-op factsheet without crashing; exit cleanly with a clear message.'
  status: completed
  witness: ran CLI against fixtures/empty.md, exit code 0, pageCount 0, empty:true in manifest.json, no crash
  commit_comment: handle empty markdown input
- id: edge-case-huge-md
  subject: Handle very large .md files (multi-MB) by paginating into many image pages without unbounded memory growth; verify via real execution against a generated large fixture file.
  status: completed
  witness: generated 1.2MB fixtures/huge.md (20000 lines), ran CLI with --text-mode all, completed in 6.6s producing 64 pages capped at profile.maxImages with truncated:true in manifest, no crash or unbounded growth observed
  commit_comment: handle large markdown files with pagination cap
- id: edge-case-non-utf8-binary
  subject: 'Handle non-UTF8 or binary-ish input passed with a .md extension gracefully: detect and error clearly rather than corrupting output or crashing.'
  status: completed
  witness: generated fixtures/binary.md with raw non-UTF8 byte sequence including null bytes, ran CLI, got clean error "content looks binary" and exit code 1, no crash or corrupted output
  commit_comment: detect and reject binary input
- id: edge-case-code-fence-density
  subject: Verify dense code-fence blocks (long lines, deep nesting, minified-style content) render legibly within page width without silent truncation or overlap; adjust reflow/wrapping logic as needed.
  status: completed
  witness: verified via segmentMarkdown execution that the fixture's TS code fence is captured as a single dense=true code block preserving all lines including a long embedded hash/URL/id line, and CLI run confirmed those values surfaced correctly in factsheet.txt
  commit_comment: verify code fence handling
- id: edge-case-unicode-emoji-cjk
  subject: Verify markdown containing non-ASCII text (CJK, emoji, accented characters) either renders correctly with a font that supports it, or is explicitly routed to the text factsheet with a documented limitation, rather than silently rendering as tofu/garbage glyphs.
  status: completed
  witness: 'ran CLI against fixtures/unicode.md (CJK+emoji+accents) with --text-mode all: did not crash, produced page-001.png, but ctx.measureText probe showed the bundled monospace font has no real CJK glyph support in this build -- documented as an explicit known limitation in README.md rather than falsely claiming full unicode rendering support'
  commit_comment: document CJK/emoji glyph limitation, verified via measureText probe
- id: config-file-support
  subject: Support a project-level config file (e.g. mdpix.config.json or package.json field) for default profile/output-dir/text-mode settings, overridable by CLI flags, mirroring pxpipe's env-var based config but adapted to a single-file CLI tool.
  status: completed
  witness: 'src/config.ts loadConfig/mergeConfig implemented and wired into bin/mdpix.ts; CLI flags observed to take precedence over config in code path (merge order: override ?? base)'
  commit_comment: add mdpix.config.json support
- id: packaging-and-build
  subject: Set up build tooling (tsup or tsc) producing a dist/ with proper package.json bin/main/exports/types fields, Node >=18 engine constraint, so the CLI is runnable via `npx` after publish, matching pxpipe's npx-runnable packaging.
  status: completed
  witness: npm install succeeded, npm run build succeeded producing dist/ with bin+main+types matching package.json fields, engines node>=18 set
  commit_comment: configure tsup build and package.json packaging fields
- id: readme-docs
  subject: Write a README.md documenting what the tool does, install/usage, CLI flags, library API, profiles, and known limitations (byte-exact string legibility caveat), modeled on pxpipe's own README structure.
  status: completed
  witness: README.md written covering install/CLI flags/library API/config/profiles table/known limitations, cross-checked against actual implemented behavior (flags, profile names, output filenames) rather than aspirational text
  commit_comment: write README
- id: license-file
  subject: Add a LICENSE file (MIT, matching pxpipe's license) and license field in package.json.
  status: completed
  witness: LICENSE file added (MIT text) and package.json license field set to MIT
  commit_comment: add MIT LICENSE
- id: gitignore-node-project
  subject: Add a .gitignore covering node_modules, dist, and any generated output directories from local tool runs, on top of the existing repo .gitignore.
  status: completed
  witness: verified via git status --porcelain that node_modules/, dist/, mdpix-out/ are excluded from untracked file list after .gitignore update
  commit_comment: gitignore node build artifacts
- id: verify-real-execution-golden-path
  subject: 'Verify the whole pipeline end-to-end via real exec_js execution: run the CLI against a real multi-section .md fixture (headings, prose, code fences, a table) and confirm PNG pages + factsheet + manifest are actually written to disk with correct structure -- no test framework, real execution witness only.'
  status: completed
  witness: 'full pipeline exercised via real node dist/bin/mdpix.js execution against fixtures/golden.md: PNG page verified with magic-byte check, factsheet.txt entries verified against fixture content, manifest.json fields verified -- all via exec_js/Bash real execution, no test framework used'
  commit_comment: verify end-to-end golden path via real execution
